server:
  port: ${PARKIO_SERVER_PORT:8023}

spring:
  application:
    name: parkio

  profiles:
    default: dev

  mvc:
    servlet:
      # Prefijo global de version para todos los controllers Spring MVC.
      # Un controller con @RequestMapping("/roles") queda expuesto como /api/v1/roles.
      path: /api/v1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: ${PARKIO_FLYWAY_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        # Expone solamente health por HTTP para evitar publicar endpoints sensibles de Actuator.
        include: health

  endpoint:
    health:
      # Oculta detalles internos del health check y devuelve solo el estado general de la aplicacion.
      show-details: never

      probes:
        # Habilita liveness y readiness para monitoreo futuro en contenedores o ambientes productivos.
        enabled: true

springdoc:
  api-docs:
    # Desactiva la generacion del contrato OpenAPI por defecto.
    # Cada perfil decide explicitamente si lo habilita.
    enabled: false

  swagger-ui:
    # Desactiva Swagger UI por defecto para evitar exposicion accidental en ambientes no controlados.
    enabled: false

parkio:
  cors:
    allowed-origins: ${PARKIO_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173}
    allowed-methods: ${PARKIO_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${PARKIO_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Transaction-Id}
    exposed-headers: ${PARKIO_CORS_EXPOSED_HEADERS:X-Transaction-Id}
    max-age-seconds: ${PARKIO_CORS_MAX_AGE_SECONDS:3600}

  security:
    jwt:
      issuer: ${PARKIO_JWT_ISSUER:parkio}
      secret: ${PARKIO_JWT_SECRET:clave-local-de-desarrollo-cambiar-en-produccion}
      expiration-minutes: ${PARKIO_JWT_EXPIRATION_MINUTES:60}

  reserva:
    # Minutos de vigencia para una reserva nueva.
    # Se puede cambiar por ambiente con PARKIO_RESERVA_EXPIRACION_MINUTOS sin modificar backend ni frontend.
    expiracion-minutos: ${PARKIO_RESERVA_EXPIRACION_MINUTOS:20}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [transactionId=%X{transactionId}] [%thread] %logger{36} - %msg%n"
