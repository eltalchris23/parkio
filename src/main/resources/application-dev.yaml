spring:
  datasource:
    url: ${PARKIO_DB_URL:jdbc:postgresql://localhost:5432/parkio}
    username: ${PARKIO_DB_USERNAME:postgres}
    password: ${PARKIO_DB_PASSWORD:123123}

  jpa:
    show-sql: ${PARKIO_JPA_SHOW_SQL:true}

springdoc:
  api-docs:
    # Habilita el contrato OpenAPI en desarrollo para que Swagger UI pueda leer los endpoints reales.
    enabled: true

  swagger-ui:
    # Habilita la interfaz Swagger UI solo en desarrollo.
    enabled: true
    # Ruta corta para abrir la documentacion interactiva desde navegador.
    path: /swagger-ui.html
