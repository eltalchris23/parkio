spring:
  datasource:
    url: ${PARKIO_DB_URL}
    username: ${PARKIO_DB_USERNAME}
    password: ${PARKIO_DB_PASSWORD}

  jpa:
    show-sql: false

springdoc:
  api-docs:
    # Mantiene oculto el contrato OpenAPI en produccion.
    enabled: false

  swagger-ui:
    # Mantiene oculta la interfaz Swagger UI en produccion.
    enabled: false

parkio:
  security:
    jwt:
      issuer: ${PARKIO_JWT_ISSUER}
      secret: ${PARKIO_JWT_SECRET}
      expiration-minutes: ${PARKIO_JWT_EXPIRATION_MINUTES:60}
